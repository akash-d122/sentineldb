version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinel_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sentineldb
      POSTGRES_RO_PASSWORD: ${POSTGRES_RO_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_app -d sentineldb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uvicorn sentineldb.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LITELLM_MODEL=${LITELLM_MODEL:-gemini/gemini-2.5-flash-lite}
    volumes:
      - ./src:/app/src
      - ./instances.yaml:/app/instances.yaml
      - ./runbooks:/app/runbooks
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A sentineldb.worker.app worker --loglevel=info
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LITELLM_MODEL=${LITELLM_MODEL:-gemini/gemini-2.5-flash-lite}
    volumes:
      - ./src:/app/src
      - ./instances.yaml:/app/instances.yaml
      - ./runbooks:/app/runbooks
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
